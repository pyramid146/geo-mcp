# Smithery manifest for geo-mcp.
#
# Note: the Smithery CLI `smithery mcp publish <URL>` command does NOT
# read this file. For external (already-hosted) MCP servers it reads
# only the positional URL argument and the --config-schema flag. The
# yaml here is retained for documentation / Smithery UI reference —
# its ``runtime: remote`` + ``headers`` templating is unused by the
# CLI publish path.
#
# Canonical publish command (run from repo root, with Smithery CLI
# authenticated via ``smithery auth login``):
#
#   smithery mcp publish https://geomcp.dev/mcp \
#     -n cairo-pyramids/geo-mcp \
#     --config-schema ./smithery-config-schema.json
#
# That triggers Smithery's external-server path (no build, no bundle).
# Our /oauth/authorize endpoint handles the Smithery OAuth consent
# flow; see geo_mcp/oauth.py for details.
runtime: remote

remote:
  url: https://geomcp.dev/mcp
  transport: streamable-http

configSchema:
  type: object
  required:
    - apiKey
  properties:
    apiKey:
      type: string
      title: API key
      description: >
        Your geo-mcp API key. Free at
        https://geomcp.dev/signup — one email, one key, no card.
      format: password

# Header templating — retained for documentation / UI-based publish.
# The CLI publish path uses OAuth instead; this block is inert there.
headers:
  X-API-Key: "{{apiKey}}"
